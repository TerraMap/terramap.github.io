name: Build & Release Native App

on:
  push:
    tags: ["native-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. native-v0.1.0). Leave blank for a dry-run build with no release."
        required: false

permissions:
  contents: write

concurrency:
  group: native-release
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: mac-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci

      - name: Build Tauri app
        run: npx tauri build --config native/tauri.conf.json --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TerraMap-${{ matrix.label }}
          path: |
            native/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            native/target/${{ matrix.target }}/release/bundle/macos/*.app
            native/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            native/target/${{ matrix.target }}/release/bundle/deb/*.deb
            native/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            native/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            native/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            native/target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/native-v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: TerraMap ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          append_body: true
          body: |
            ## TerraMap Native App
            TerraMap Native is a cross-platform, interactive Terraria v1.4.5 world map viewer that loads quickly and lets you pan, zoom, find blocks, ores, items in chests, dungeons, NPCs, etc.

            It's the same as the web app, but with a better experience for viewing worlds without spoilers.
            It makes it much easier than the web version to choose a world, then choose a player map for the chosen world.
            Only the parts of the world that have been seen by the player are shown in TerraMap.

            ## Installation
            - **macOS**: Download the `.dmg`, open it, and drag TerraMap to Applications.
            - **Linux**: Download the `.AppImage`, `.deb`, or `.rpm` for your distro.
            - **Windows**: Download the `.msi` installer or `.exe` (NSIS) installer.

            ## macOS note
            macOS may block the downloaded app. To fix this, run in Terminal:
            ```
            xattr -cr /Applications/TerraMap.app
            ```
            Or right-click the app and select **Open** to bypass the warning.
          files: |
            **/*.dmg
            **/*.app.tar.gz
            **/*.AppImage
            **/*.deb
            **/*.rpm
            **/*.exe
            **/*.msi
